name: Build Caddy Plus Images

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      caddy_version:
        description: "Optional single Caddy version from caddy-versions.txt"
        required: false
        type: string
      push_images:
        description: "Push built images to GHCR"
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  packages: write

env:
  BUILD_PLATFORM: linux/amd64

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install validation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Validate scripts and manifests
        run: |
          shellcheck scripts/build-image.sh scripts/smoke-test.sh
          test -s caddy-versions.txt
          awk 'NF && $1 !~ /^#/ && $1 ~ /^v/ { print "Caddy versions must not start with v: " $1; exit 1 }' caddy-versions.txt
          while IFS= read -r version; do
            case "$version" in ""|\#*) continue ;; esac
            test -s "plugin-matrix/$version.txt"
            awk 'NF && $1 !~ /^#/ && $1 !~ /@/ { print "Plugin entries must pin a version: " $1; exit 1 }' "plugin-matrix/$version.txt"
          done < caddy-versions.txt

  build-images:
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v5

      - name: Set image name
        shell: bash
        run: |
          echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: startsWith(github.ref, 'refs/tags/') || inputs.push_images
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image set
        env:
          CADDY_VERSION: ${{ inputs.caddy_version }}
          PUSH_IMAGE: ${{ (startsWith(github.ref, 'refs/tags/') || inputs.push_images) && 'true' || 'false' }}
        run: scripts/build-image.sh

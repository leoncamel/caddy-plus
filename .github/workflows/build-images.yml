name: Build Caddy Plus Images

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      caddy_version:
        description: "Optional single Caddy version from caddy-versions.txt"
        required: false
        type: string
      push_images:
        description: "Push built images to GHCR"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

env:
  BUILD_PLATFORM: linux/amd64
  DRY_BUILD_CADDY_VERSION: 2.11.2

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Install validation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Validate scripts and manifests
        run: |
          shellcheck scripts/build-image.sh scripts/smoke-test.sh scripts/verify-version.sh
          test -s caddy-versions.txt
          awk 'NF && $1 !~ /^#/ && $1 ~ /^v/ { print "Caddy versions must not start with v: " $1; exit 1 }' caddy-versions.txt
          while IFS= read -r version; do
            case "$version" in ""|\#*) continue ;; esac
            test -s "plugin-matrix/$version.txt"
            awk 'NF && $1 !~ /^#/ && $1 !~ /@/ { print "Plugin entries must pin a version: " $1; exit 1 }' "plugin-matrix/$version.txt"
          done < caddy-versions.txt

  dry-build:
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build latest supported image without publishing
        env:
          CADDY_VERSION: ${{ env.DRY_BUILD_CADDY_VERSION }}
          BUILD_CACHE: none
          PUSH_IMAGE: "false"
        run: scripts/build-image.sh

      - name: Smoke-test dry build
        env:
          CADDY_VERSION: ${{ env.DRY_BUILD_CADDY_VERSION }}
        run: scripts/smoke-test.sh

  build-images:
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - name: Set image name
        shell: bash
        run: |
          echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.push_images)
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image set
        env:
          CADDY_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.caddy_version || '' }}
          BUILD_CACHE: ${{ (startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.push_images)) && 'gha' || 'none' }}
          PUSH_IMAGE: ${{ (startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.push_images)) && 'true' || 'false' }}
        run: scripts/build-image.sh

  verify-published:
    needs: build-images
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.push_images)
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v5

      - name: Set image name
        shell: bash
        run: |
          echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify published images
        env:
          SELECTED_CADDY_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.caddy_version || '' }}
        run: |
          if [ -n "$SELECTED_CADDY_VERSION" ]; then
            versions="$SELECTED_CADDY_VERSION"
          else
            versions="$(awk 'NF && $1 !~ /^#/ { print $1 }' caddy-versions.txt)"
          fi

          for version in $versions; do
            docker pull "$IMAGE_NAME:caddy-$version"
            modules="$(docker run --rm --platform "$BUILD_PLATFORM" "$IMAGE_NAME:caddy-$version" caddy list-modules)"
            printf "%s\n" "$modules" | grep '^dns\.providers\.alidns$'
            printf "%s\n" "$modules" | grep '^http\.handlers\.waf$'

            CADDY_VERSION="$version" scripts/smoke-test.sh
          done
